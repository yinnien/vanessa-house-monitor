name: 每日租屋監控

on:
  # schedule:
  #   - cron: '0 1 * * *'   # 每天 09:00 台北時間 (01:00 UTC)（暫停中）
  workflow_dispatch:       # 手動觸發（用來測試）

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_monitor.txt

      - name: Install Python dependencies
        run: pip install -r requirements_monitor.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 監控好室正居
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python house_monitor.py

      - name: 監控 591 中山區
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_591.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-run-${{ github.run_number }}
          path: |
            screenshot.png
            screenshot_591.png
            page_dump.html
          retention-days: 7

      - name: Commit updated state
        run: |
          git config user.name "house-monitor[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json seen_591.json
          git diff --staged --quiet || (git commit -m "chore: update seen state [skip ci]" && git push)
